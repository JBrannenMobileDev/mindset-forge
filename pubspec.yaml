name: mindsetforge
description: MindsetForge — Premium mindset coaching app powered by AI.
publish_to: 'none'
version: 1.0.9+11

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.3.0
  firebase_app_check: ^0.3.1
  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.3.0
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  just_audio: ^0.9.41
  just_audio_background: ^0.0.1-beta.15
  confetti: ^0.7.0
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4
  # Data & storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.0
  uuid: ^4.4.2
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  # Monetization
  purchases_flutter: ^8.2.1
  # Deep links
  app_links: ^6.4.0
  # Notifications
  flutter_local_notifications: ^18.0.1
  # Utilities
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.1
  share_plus: ^10.1.1
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0
  mixpanel_flutter: ^2.10.0
  home_widget: ^0.9.3
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  remove_alpha_ios: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#0A0A0F"
    theme_color: "#9B40FF"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#0A0A0F"
  image: assets/images/splash_logo.png
  android_12:
    color: "#0A0A0F"
    image: assets/images/splash_logo.png
    icon_background_color: "#0A0A0F"
  ios: true
  android: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
